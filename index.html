<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropfleet Mission Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <header class="header">
    <h1>Dropfleet Commander Mission Generator</h1>
    <div id="modeBadge" class="mode-badge badge-casual">Mode: Casual</div>
  </header>

  <!-- CONTROL PANEL -->
  <section class="control-panel">

    <div class="player-row">
      <input id="player1" class="player-input" placeholder="Player 1 Name">
      <input id="player2" class="player-input" placeholder="Player 2 Name">
      <button class="btn" id="assignBtn" onclick="assignPlayers()">Assign Red/Blue</button>
      <button class="btn" id="resetPlayersBtn" onclick="resetPlayers()" disabled>Reset</button>
    </div>

    <div class="mode-row">
      <button class="btn" onclick="rollMission('casual')" title="Roll 1-4 for all categories">Casual</button>

      <button class="btn" onclick="rollMission('narrative')" title="Roll 1-6 for all categories">
        Casual Narrative
      </button>

      <button class="btn"
        onclick="rollMission('competitive')"
        title="Deployment limited to 1-4, Layouts limited to 1-3">
        Competitive
      </button>

      <button class="btn" onclick="rollMission('standard')" title="Roll Scenario only">
        Standard Scenario
      </button>
    </div>

    <div class="copy-row">
      <button class="btn" onclick="copyMission()">Copy Mission to Clipboard</button>
    </div>

  </section>

  <!-- RESULTS -->
  <section id="missionBoard">
    <div id="playerResults" class="player-results"></div>
    <div id="results" class="results"></div>
    <div class="reminder">
      Remember: Determine Red/Blue players before game setup.
    </div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
