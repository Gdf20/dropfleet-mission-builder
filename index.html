<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropfleet Mission Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Dropfleet Commander Mission Generator</h1>
  <div id="modeBadge" class="badge badge-casual">Mode: Casual</div>

  <!-- PLAYER CONTROLS -->
  <div class="row">
    <input id="player1" class="input" placeholder="Player 1 Name">
    <input id="player2" class="input" placeholder="Player 2 Name">
    <button class="btn" id="assignBtn" onclick="assignPlayers()">Assign Red/Blue</button>
    <button class="btn" id="resetPlayersBtn" onclick="resetPlayers()" disabled>Reset</button>
  </div>

  <!-- MODE BUTTONS -->
  <div class="row">
    <button class="btn" onclick="rollMission('casual')" title="Roll 1-4 for all categories">Casual</button>
    <button class="btn" onclick="rollMission('narrative')" title="Roll 1-6 for all categories">Casual Narrative</button>
    <button class="btn" onclick="rollMission('competitive')" title="Deployment limited to 1-4, Layouts limited to 1-3">Competitive</button>
    <button class="btn" onclick="rollMission('standard')" title="Roll Scenario only">Standard Scenario</button>
  </div>

  <!-- COPY BUTTON -->
  <div class="row">
    <button class="btn" onclick="copyMission()">Copy Mission to Clipboard</button>
  </div>

  <!-- RESULTS -->
  <div id="playerResults" class="player-results"></div>
  <div id="results"></div>
  <div class="reminder">Determine Red/Blue players before game setup.</div>

</div>

<script src="script.js"></script>
</body>
</html>
