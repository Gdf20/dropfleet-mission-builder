<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropfleet Commander Mission Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Dropfleet Commander Mission Generator</h1>
  <div id="modeBadge" class="mode-badge">Mode: Casual</div>
</div>

<div class="player-setup">
  <input id="player1" type="text" placeholder="Player 1 Name">
  <input id="player2" type="text" placeholder="Player 2 Name">
  <button id="assignBtn" onclick="assignPlayers()">Assign Red/Blue</button>
  <button id="resetPlayersBtn" onclick="resetPlayers()" disabled>Reset Players</button>
</div>

<div id="playerResults" class="player-results"></div>

<div class="mode-buttons">
  <button onclick="rollMission('casual')">Casual (1-4)</button>
  <button onclick="rollMission('narrative')">Casual Narrative (1-6)</button>
  <button onclick="rollMission('competitive')">Competitive</button>
  <button onclick="rollMission('standard')">Standard Scenario</button>
</div>

<div id="exportArea" class="export-area">
  <div id="results" class="results"></div>
  <div class="reminder">Remember: Determine Red/Blue players before game setup.</div>
</div>

<div class="export-buttons">
  <button onclick="copyMission()">Copy Mission to Clipboard</button>
  <button onclick="exportPNG()">Export Mission to PNG</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
