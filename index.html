<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropfleet Mission Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Dropfleet Commander Mission Generator</h1>
  <div id="modeBadge" class="mode-badge badge-casual">Mode: Casual</div>
</div>

<div class="player-inputs">
  <input id="player1" placeholder="Player 1 Name">
  <input id="player2" placeholder="Player 2 Name">
  <button id="assignBtn" onclick="assignPlayers()">Assign Red/Blue</button>
  <button id="resetPlayersBtn" onclick="resetPlayers()" disabled>Reset</button>
</div>

<div class="buttons-container">
  <button class="mode-btn" onclick="rollMission('casual')" title="Roll 1-4 for all categories">Casual</button>
  <button class="mode-btn" onclick="rollMission('narrative')" title="Roll 1-6 for all categories">Casual Narrative</button>

  <div class="mode-btn-wrapper">
    <button class="mode-btn" onclick="rollMission('competitive')" title="Deployment limited to 1-4, Layouts limited to 1-3">Competitive</button>
    <div class="mode-descriptor">Deployment limited to 1-4, Layouts limited to 1-3</div>
  </div>

  <button class="mode-btn" onclick="rollMission('standard')" title="Roll Scenario only">Standard Scenario</button>
</div>

<div id="missionBoard">
  <div class="player-results" id="playerResults"></div>
  <div id="results" class="results"></div>
  <div class="reminder">
    Remember: Determine Red/Blue players before game setup.
  </div>
</div>

<div class="footer">
  <button onclick="copyMission()">Copy Mission to Clipboard</button>
</div>

<script src="script.js"></script>
</body>
</html>
